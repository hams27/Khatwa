<!-- ================= MAIN CONTAINER ================= -->
<div class="reset-password-container">

  <!-- ================= CENTER FORM ================= -->
  <div class="form-wrapper">
    
    <div class="form-container">

      <!-- Welcome Header -->
      <div class="form-header">
        <h2 class="form-title">
          <span class="title-gradient">إعادة تعيين كلمة المرور</span>
        </h2>
        <p class="form-subtitle">أدخل كلمة المرور الجديدة</p>
      </div>

      <!-- Success Message -->
      <div class="success-message" *ngIf="resetSuccess">
        <div class="success-icon">✓</div>
        <p>تم تغيير كلمة المرور بنجاح!</p>
        <p class="redirect-text">سيتم تحويلك لصفحة تسجيل الدخول...</p>
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="resetError">
        <div class="error-icon">⚠</div>
        <p>{{ errorMessage }}</p>
      </div>

      <!-- Reset Password Form -->
      <form class="reset-password-form" (ngSubmit)="onSubmit()" *ngIf="!resetSuccess && token">
        
        <!-- Password Field -->
        <div class="form-group" 
             [class.has-error]="passwordTouched && passwordError"
             [class.has-value]="password">
          <label class="form-label">
            <i class="fas fa-lock"></i>
            كلمة المرور الجديدة
          </label>
          <div class="input-wrapper">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              class="form-input"
              [(ngModel)]="password"
              name="password"
              (blur)="validatePassword()"
              (input)="passwordTouched && validatePassword()"
              placeholder="أدخل كلمة المرور الجديدة"
              [disabled]="isLoading">
            <button type="button" class="toggle-password" (click)="togglePassword()">
              <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
            <div class="input-border"></div>
            <div class="input-glow"></div>
          </div>
          <span class="error-text" *ngIf="passwordTouched && passwordError">
            <i class="fas fa-exclamation-circle"></i>
            {{ passwordError }}
          </span>
        </div>

        <!-- Confirm Password Field -->
        <div class="form-group" 
             [class.has-error]="confirmTouched && confirmError"
             [class.has-value]="confirmPassword">
          <label class="form-label">
            <i class="fas fa-lock"></i>
            تأكيد كلمة المرور
          </label>
          <div class="input-wrapper">
            <input 
              [type]="showConfirmPassword ? 'text' : 'password'" 
              class="form-input"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              (blur)="validateConfirmPassword()"
              (input)="confirmTouched && validateConfirmPassword()"
              placeholder="أعد كتابة كلمة المرور"
              [disabled]="isLoading">
            <button type="button" class="toggle-password" (click)="toggleConfirmPassword()">
              <i [class]="showConfirmPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
            <div class="input-border"></div>
            <div class="input-glow"></div>
          </div>
          <span class="error-text" *ngIf="confirmTouched && confirmError">
            <i class="fas fa-exclamation-circle"></i>
            {{ confirmError }}
          </span>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="submit-btn"
          [disabled]="isLoading">
          <span class="btn-content" *ngIf="!isLoading">
            <span class="btn-text">تغيير كلمة المرور</span>
            <i class="fas fa-check btn-icon"></i>
          </span>
          <span class="btn-loader" *ngIf="isLoading">
            <div class="spinner"></div>
            <span>جاري التغيير...</span>
          </span>
          <div class="btn-shine"></div>
        </button>

        <!-- Back to Login -->
        <div class="back-to-login">
          <p>
            تذكرت كلمة المرور؟ 
            <a routerLink="/login" class="link-highlight">
              سجل الدخول
              <i class="fas fa-arrow-left"></i>
            </a>
          </p>
        </div>
      </form>

      <!-- No Token State -->
      <div class="back-to-login" *ngIf="!token">
        <a routerLink="/forget-password" class="link-highlight" style="font-size: 18px; font-weight: 700;">
          <i class="fas fa-arrow-right"></i>
          طلب رابط استعادة جديد
        </a>
      </div>

      <!-- Success State - Back to Login -->
      <div class="back-to-login" *ngIf="resetSuccess">
        <a routerLink="/login" class="link-highlight" style="font-size: 18px; font-weight: 700;">
          <i class="fas fa-arrow-right"></i>
          العودة لتسجيل الدخول
        </a>
      </div>

    </div>
  </div>

</div>
